name: Prepare Claim

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number for the claim
        required: true
      address:
        description: Snapshot claimant address
        required: true
      recipient:
        description: Manual payout recipient address
        required: true
      date:
        description: Message date in YYYY-MM-DD; defaults to current UTC date
        required: false

permissions:
  contents: read
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare signing message
        env:
          CLAIM_ADDRESS: ${{ inputs.address }}
          CLAIM_RECIPIENT: ${{ inputs.recipient }}
          CLAIM_ISSUE_NUMBER: ${{ inputs.issue_number }}
          CLAIM_DATE: ${{ inputs.date }}
          CLAIM_ISSUE_URL: https://github.com/${{ github.repository }}/issues/${{ inputs.issue_number }}
        run: |
          if [ -z "$CLAIM_DATE" ]; then
            CLAIM_DATE="$(date -u +%F)"
          fi

          npm run prepare:claim -- \
            --address "$CLAIM_ADDRESS" \
            --recipient "$CLAIM_RECIPIENT" \
            --issue-url "$CLAIM_ISSUE_URL" \
            --date "$CLAIM_DATE" \
            --out-md claim-comment.md

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAIM_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: gh issue comment "$CLAIM_ISSUE_NUMBER" --body-file claim-comment.md
