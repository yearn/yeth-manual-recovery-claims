name: Refresh Unclaimed Inventory

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - data/manual-claims.jsonl

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract unclaimed inventory
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: npm run extract:unclaimed

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- data/generated/unclaimed-claims.*.json data/generated/unclaimed-claims.*.csv; then
            echo "No unclaimed inventory changes to propose."
            exit 0
          fi

          BRANCH="automation/refresh-unclaimed-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/generated/unclaimed-claims.*.json data/generated/unclaimed-claims.*.csv
          git commit -m "chore(claims): refresh unclaimed inventory"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "chore(claims): refresh unclaimed inventory" \
            --body "Refreshes generated unclaimed yETH manual claim inventory from mainnet."
